services:
  - type: web
    name: calories-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: APP_NAME
        value: VisionMacro API

  - type: static
    name: calories-ai-frontend
    rootDir: frontend
    buildCommand: npm install && npx expo export -p web
    publishDir: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://calories-ai-backend.onrender.com
      - key: EXPO_PUBLIC_SUPABASE_URL
        value: https://nlyvrwqfvxzoesgmtacd.supabase.co
